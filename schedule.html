  <script>
    (function () {
      const dict = {
        en: { toggle: '日本語', description: 'Schedule for State of the Map Asia 2026 OSAKA', og_description: 'Schedule for State of the Map Asia 2026 OSAKA', menu_home: 'HOME', menu_about: 'About SotM Asia', menu_news: 'News', menu_venue: 'Venue', menu_schedule: 'Schedule', eyebrow: 'Schedule', title: 'Program Schedule', lead: 'Conference timetable and session lineup.', d1: 'Day 1', d2: 'Day 2', d3: 'Social Events' },
        ja: { toggle: 'English', description: 'State of the Map Asia 2026 OSAKA のスケジュール', og_description: 'State of the Map Asia 2026 OSAKA のスケジュール', menu_home: 'HOME', menu_about: 'SotM Asia について', menu_news: 'ニュース', menu_venue: '会場', menu_schedule: 'スケジュール', eyebrow: 'スケジュール', title: 'プログラム', lead: 'カンファレンスのタイムテーブルとセッション情報です。', d1: '1日目', d2: '2日目', d3: '交流イベント' }
      };
      const menuToggle = document.getElementById('menu-toggle');
      const siteMenu = document.getElementById('site-menu');
      const langToggle = document.getElementById('lang-toggle');
      const metaDescription = document.querySelector('meta[name="description"]');
      const ogDescription = document.querySelector('meta[property="og:description"]');
      function applyLang(lang) { const t = dict[lang] || dict.en; document.documentElement.lang = lang; langToggle.textContent = t.toggle; if (metaDescription) metaDescription.setAttribute('content', t.description); if (ogDescription) ogDescription.setAttribute('content', t.og_description); document.querySelectorAll('[data-i18n]').forEach(function (el) { const key = el.getAttribute('data-i18n'); if (t[key]) el.textContent = t[key]; }); localStorage.setItem('preferredLanguage', lang); }
      let currentLang = localStorage.getItem('preferredLanguage') === 'ja' ? 'ja' : 'en'; applyLang(currentLang);
      langToggle.addEventListener('click', function () { currentLang = currentLang === 'en' ? 'ja' : 'en'; applyLang(currentLang); });
      menuToggle.addEventListener('click', function () { const open = siteMenu.classList.toggle('open'); menuToggle.setAttribute('aria-expanded', open ? 'true' : 'false'); siteMenu.setAttribute('aria-hidden', open ? 'false' : 'true'); });
    })();
  </script>
